# Organization VS Agent deployment — Helm chart values
#
# Hardcoded for hologram-avatar testnet deployment on vs.hologram.zone
chartSource: oci://registry-1.docker.io/veranalabs/vs-agent-chart
chartVersion: v1.9.1

global:
  domain: vs.hologram.zone

name: organization-vs
replicas: 1

adminPort: 3000
didcommPort: 3001
eventsBaseUrl: "https://organization-vs.vs.hologram.zone"
publicDidMethod: "webvh"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  host: "organization-vs.vs.hologram.zone"
  tlsSecret: "organization-vs.vs.hologram.zone-cert"
  public:
    enableCors: true
  private:
    enableCors: true
    whitelistSourceRange: ""
    tlsSecret: ""
    host: ""

extraEnv:
  - name: ENABLE_PUBLIC_API_SWAGGER
    value: "true"
  - name: AGENT_LOG_LEVEL
    value: "3"
  - name: USE_CORS
    value: "true"

storage:
  size: 1Gi
  storageClassName: csi-cinder-high-speed

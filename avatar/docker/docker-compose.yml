# =============================================================================
# Issuer Chatbot VS — Local Docker Compose
# =============================================================================
#
# Runs the VS Agent + Issuer Chatbot for local development/testing.
#
# Prerequisites:
#   - Docker and Docker Compose installed
#   - ngrok running on port 3003
#
# Usage:
#   source avatar/config.env
#   export NGROK_DOMAIN=your-domain.ngrok-free.app
#   docker compose up --build
#
# =============================================================================

services:
  vs-agent:
    image: ${VS_AGENT_IMAGE:-veranalabs/vs-agent:latest}
    platform: linux/amd64
    ports:
      - "${VS_AGENT_ADMIN_PORT:-3002}:3000"
      - "${VS_AGENT_PUBLIC_PORT:-3003}:3001"
    environment:
      - AGENT_PUBLIC_DID=did:webvh:${NGROK_DOMAIN}
      - AGENT_LABEL=${SERVICE_NAME:-Example Issuer Chatbot}
      - ENABLE_PUBLIC_API_SWAGGER=true
      - EVENTS_BASE_URL=http://issuer-chatbot:${CHATBOT_PORT:-4000}
    volumes:
      - vs-agent-data:/root/.afj

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data

  issuer-chatbot:
    build: ../issuer-chatbot
    ports:
      - "${CHATBOT_PORT:-4000}:${CHATBOT_PORT:-4000}"
    environment:
      - VS_AGENT_ADMIN_URL=http://vs-agent:3000
      - ORG_VS_ADMIN_URL=${ORG_VS_ADMIN_URL:-http://vs-agent:3000}
      - ORG_VS_PUBLIC_URL=${ORG_VS_PUBLIC_URL:-}
      - CHATBOT_PORT=${CHATBOT_PORT:-4000}
      - DATABASE_URL=${DATABASE_URL:-sqlite:./data/chatbot.db}
      - SERVICE_NAME=${SERVICE_NAME:-Example Issuer Chatbot}
      - CUSTOM_SCHEMA_BASE_ID=${CUSTOM_SCHEMA_BASE_ID:-example}
      - ENABLE_ANONCREDS=${ENABLE_ANONCREDS:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-avatar-previews}
      - MINIO_USE_SSL=false
      - MINIO_PUBLIC_URL=${MINIO_PUBLIC_URL:-http://localhost:9000}
    volumes:
      - chatbot-data:/app/data
    depends_on:
      - vs-agent
      - minio

volumes:
  vs-agent-data:
  chatbot-data:
  minio-data:

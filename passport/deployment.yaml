# Passport Issuer VS Agent deployment — Helm chart values
#
# Hardcoded for hologram-verifiable-services testnet deployment on vs.hologram.zone
chartSource: oci://registry-1.docker.io/veranalabs/vs-agent-chart
chartVersion: v1.9.2

global:
  domain: vs.hologram.zone

name: passport
replicas: 1

adminPort: 3000
didcommPort: 3001
eventsBaseUrl: "http://passport-issuer-app:2903"
publicDidMethod: "webvh"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingress:
  host: "passport.vs.hologram.zone"
  tlsSecret: "passport.vs.hologram.zone-cert"
  public:
    enableCors: true
  private:
    enableCors: true
    whitelistSourceRange: ""
    tlsSecret: ""
    host: ""
chatbot:
  host: "passport-app.vs.hologram.zone"

database:
  enabled: true
  existingSecret: passport-db-secret
  secretPwdKey: POSTGRES_PASSWORD
  user: vsagent
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

redis:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

extraEnv:
  - name: ENABLE_PUBLIC_API_SWAGGER
    value: "true"
  - name: AGENT_LOG_LEVEL
    value: "3"
  - name: USE_CORS
    value: "true"

storage:
  size: 1Gi
  storageClassName: csi-cinder-high-speed

name: 7_ Deploy X Agent

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Which step to run"
        required: true
        type: choice
        options:
          - deploy
          - get-credentials
          - all
        default: all

jobs:
  deploy-x-agent:
    name: Deploy X Agent VS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::This workflow can only run on the main branch (current: ${GITHUB_REF_NAME})"
            exit 1
          fi
          echo "NETWORK=testnet" >> "$GITHUB_ENV"

      - name: Load configuration
        run: |
          set -a
          source x-agent/config.env
          set +a
          while IFS= read -r line; do
            key="${line%%=*}"
            echo "${key}=${!key}" >> "$GITHUB_ENV"
          done < <(grep -E '^[A-Z_]+=' x-agent/config.env)

      - name: Parse deployment.yaml
        run: |
          CHART_SOURCE=$(yq '.chartSource' x-agent/deployment.yaml)
          CHART_VERSION=$(yq '.chartVersion' x-agent/deployment.yaml)
          CHART_NAMESPACE="${{ secrets.K8S_NAMESPACE }}"
          RELEASE_NAME=$(yq '.nameOverride' x-agent/deployment.yaml)
          echo "CHART_SOURCE=${CHART_SOURCE}" >> "$GITHUB_ENV"
          echo "CHART_VERSION=${CHART_VERSION}" >> "$GITHUB_ENV"
          echo "CHART_NAMESPACE=${CHART_NAMESPACE}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          cat > ~/.kube/config <<'KUBEEOF'
          ${{ secrets.OVH_KUBECONFIG }}
          KUBEEOF

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.9'

      - name: Install veranad
        run: |
          VERANAD_VERSION="v0.9.4"
          curl -sfL "https://github.com/verana-labs/verana/releases/download/${VERANAD_VERSION}/veranad-linux-amd64" \
            -o /usr/local/bin/veranad
          chmod +x /usr/local/bin/veranad
          veranad version

      - name: Import account from mnemonic
        run: |
          echo "${{ secrets.VS_DEMO_MNEMONIC }}" | veranad keys add "${{ env.USER_ACC }}" --recover --keyring-backend test

      # -----------------------------------------------------------------------
      # DEPLOY: Install/upgrade via Helm (hologram-ai-agent-chart)
      # -----------------------------------------------------------------------
      - name: Create K8s secrets
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          NAMESPACE="${CHART_NAMESPACE}"

          # VS Agent DB secret
          VSAGENT_DB_PWD="${{ secrets.X_AGENT_VSAGENT_DB_PASSWORD }}"
          if [ -z "$VSAGENT_DB_PWD" ]; then
            VSAGENT_DB_PWD="$(openssl rand -hex 16)"
            echo "::warning::X_AGENT_VSAGENT_DB_PASSWORD secret not set — using generated password"
          fi
          kubectl create secret generic x-agent-db-secret \
            --namespace "$NAMESPACE" \
            --from-literal=POSTGRES_PASSWORD="$VSAGENT_DB_PWD" \
            --dry-run=client -o yaml | kubectl apply -f -

          # MinIO credentials
          MINIO_ACCESS_KEY="${{ secrets.X_AGENT_MINIO_ACCESS_KEY }}"
          MINIO_SECRET_KEY="${{ secrets.X_AGENT_MINIO_SECRET_KEY }}"
          if [ -z "$MINIO_ACCESS_KEY" ]; then
            MINIO_ACCESS_KEY="$(openssl rand -hex 12)"
            echo "::warning::X_AGENT_MINIO_ACCESS_KEY secret not set — using generated key"
          fi
          if [ -z "$MINIO_SECRET_KEY" ]; then
            MINIO_SECRET_KEY="$(openssl rand -hex 16)"
            echo "::warning::X_AGENT_MINIO_SECRET_KEY secret not set — using generated key"
          fi
          echo "MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}" >> "$GITHUB_ENV"
          echo "MINIO_SECRET_KEY=${MINIO_SECRET_KEY}" >> "$GITHUB_ENV"

      - name: Create agent pack ConfigMap
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          kubectl create configmap x-agent-agent-pack \
            --namespace "$CHART_NAMESPACE" \
            --from-file=agent-pack.yaml=x-agent/agent-pack.yaml \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy x-autonomous-mcp sidecar
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          NAMESPACE="${CHART_NAMESPACE}"
          X_MCP_IMAGE="${X_MCP_IMAGE:-io2060/x-autonomous-mcp:latest}"

          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: x-agent-mcp
            namespace: ${NAMESPACE}
            labels:
              app: x-agent-mcp
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: x-agent-mcp
            template:
              metadata:
                labels:
                  app: x-agent-mcp
              spec:
                containers:
                  - name: x-mcp
                    image: ${X_MCP_IMAGE}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 8000
                    env:
                      - name: X_API_KEY
                        valueFrom:
                          secretKeyRef:
                            name: x-agent-mcp-secret
                            key: X_API_KEY
                      - name: X_API_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: x-agent-mcp-secret
                            key: X_API_SECRET
                      - name: X_ACCESS_TOKEN
                        valueFrom:
                          secretKeyRef:
                            name: x-agent-mcp-secret
                            key: X_ACCESS_TOKEN
                      - name: X_ACCESS_TOKEN_SECRET
                        valueFrom:
                          secretKeyRef:
                            name: x-agent-mcp-secret
                            key: X_ACCESS_TOKEN_SECRET
                      - name: X_BEARER_TOKEN
                        valueFrom:
                          secretKeyRef:
                            name: x-agent-mcp-secret
                            key: X_BEARER_TOKEN
                      - name: X_MCP_MAX_ORIGINALS
                        value: "${X_MCP_MAX_ORIGINALS:-10}"
                      - name: X_MCP_MAX_REPLIES
                        value: "${X_MCP_MAX_REPLIES:-8}"
                      - name: X_MCP_MAX_LIKES
                        value: "${X_MCP_MAX_LIKES:-20}"
                      - name: X_MCP_MAX_RETWEETS
                        value: "${X_MCP_MAX_RETWEETS:-5}"
                      - name: X_MCP_MAX_FOLLOWS
                        value: "${X_MCP_MAX_FOLLOWS:-10}"
                      - name: X_MCP_MAX_UNFOLLOWS
                        value: "${X_MCP_MAX_UNFOLLOWS:-10}"
                      - name: X_MCP_MAX_DELETES
                        value: "${X_MCP_MAX_DELETES:-5}"
                      - name: X_MCP_TOON
                        value: "${X_MCP_TOON:-false}"
                      - name: X_MCP_COMPACT
                        value: "${X_MCP_COMPACT:-true}"
                      - name: X_MCP_DEDUP
                        value: "${X_MCP_DEDUP:-true}"
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8000
                      initialDelaySeconds: 10
                      periodSeconds: 30
                    readinessProbe:
                      httpGet:
                        path: /healthz
                        port: 8000
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      requests:
                        cpu: 100m
                        memory: 128Mi
                      limits:
                        cpu: 250m
                        memory: 256Mi
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: x-agent-mcp
            namespace: ${NAMESPACE}
          spec:
            selector:
              app: x-agent-mcp
            ports:
              - port: 8000
                targetPort: 8000
          EOF

          # Create/update MCP secrets
          kubectl create secret generic x-agent-mcp-secret \
            --namespace "$NAMESPACE" \
            --from-literal=X_API_KEY="${{ secrets.X_AGENT_API_KEY }}" \
            --from-literal=X_API_SECRET="${{ secrets.X_AGENT_API_SECRET }}" \
            --from-literal=X_ACCESS_TOKEN="${{ secrets.X_AGENT_ACCESS_TOKEN }}" \
            --from-literal=X_ACCESS_TOKEN_SECRET="${{ secrets.X_AGENT_ACCESS_TOKEN_SECRET }}" \
            --from-literal=X_BEARER_TOKEN="${{ secrets.X_AGENT_BEARER_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl rollout status deployment/x-agent-mcp -n "$NAMESPACE" --timeout=120s

      - name: Deploy MinIO (image generation media store)
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          NAMESPACE="${CHART_NAMESPACE}"
          MINIO_NAME="x-agent-minio"
          MINIO_BUCKET="image-gen"
          MINIO_PUBLIC_HOST="media.x-agent.vs.hologram.zone"

          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${MINIO_NAME}
            namespace: ${NAMESPACE}
            labels:
              app: ${MINIO_NAME}
          spec:
            replicas: 1
            strategy:
              type: Recreate
            selector:
              matchLabels:
                app: ${MINIO_NAME}
            template:
              metadata:
                labels:
                  app: ${MINIO_NAME}
              spec:
                containers:
                  - name: minio
                    image: minio/minio:latest
                    args: ["server", "/data", "--console-address", ":9001"]
                    ports:
                      - containerPort: 9000
                      - containerPort: 9001
                    env:
                      - name: MINIO_ROOT_USER
                        value: "${MINIO_ACCESS_KEY}"
                      - name: MINIO_ROOT_PASSWORD
                        value: "${MINIO_SECRET_KEY}"
                      - name: MINIO_BROWSER
                        value: "off"
                    volumeMounts:
                      - name: data
                        mountPath: /data
                    resources:
                      requests:
                        cpu: 100m
                        memory: 128Mi
                      limits:
                        cpu: 500m
                        memory: 512Mi
                volumes:
                  - name: data
                    persistentVolumeClaim:
                      claimName: ${MINIO_NAME}-pvc
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: ${MINIO_NAME}-pvc
            namespace: ${NAMESPACE}
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 2Gi
            storageClassName: csi-cinder-high-speed
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${MINIO_NAME}
            namespace: ${NAMESPACE}
          spec:
            selector:
              app: ${MINIO_NAME}
            ports:
              - name: api
                port: 9000
                targetPort: 9000
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${MINIO_NAME}
            namespace: ${NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/proxy-body-size: "50m"
            labels:
              app: ${MINIO_NAME}
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - ${MINIO_PUBLIC_HOST}
                secretName: ${MINIO_PUBLIC_HOST}-cert
            rules:
              - host: ${MINIO_PUBLIC_HOST}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ${MINIO_NAME}
                          port:
                            number: 9000
          EOF

          kubectl rollout status deployment/${MINIO_NAME} -n "$NAMESPACE" --timeout=120s

      - name: Deploy via Helm
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          # Strip chart metadata before passing to Helm
          yq 'del(.chartSource, .chartVersion)' x-agent/deployment.yaml > /tmp/helm-values.yaml

          # Inject credential definition ID from config.env
          export CREDENTIAL_DEFINITION_ID
          yq -i '.credentialDefinitionId = env(CREDENTIAL_DEFINITION_ID)' /tmp/helm-values.yaml

          helm upgrade --install "$RELEASE_NAME" "$CHART_SOURCE" \
            --version "$CHART_VERSION" \
            --namespace "$CHART_NAMESPACE" --create-namespace \
            --values /tmp/helm-values.yaml \
            --set chatbot.secret.OPENAI_API_KEY="${{ secrets.X_AGENT_OPENAI_API_KEY }}" \
            --set chatbot.secret.POSTGRES_PASSWORD="${{ secrets.X_AGENT_POSTGRES_PASSWORD }}" \
            --set chatbot.secret.MINIO_ACCESS_KEY="${MINIO_ACCESS_KEY}" \
            --set chatbot.secret.MINIO_SECRET_KEY="${MINIO_SECRET_KEY}" \
            --set postgres.secret.POSTGRES_PASSWORD="${{ secrets.X_AGENT_POSTGRES_PASSWORD }}" \
            --set vs-agent-chart.extraEnv[0].name=AGENT_WALLET_ID \
            --set vs-agent-chart.extraEnv[0].value="X Agent Avatar" \
            --set vs-agent-chart.extraEnv[1].name=AGENT_WALLET_KEY \
            --set vs-agent-chart.extraEnv[1].value="${{ secrets.X_AGENT_WALLET_KEY }}" \
            --wait --timeout 300s

      - name: Restart chatbot to pick up ConfigMap changes
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          kubectl rollout restart statefulset/x-agent-chart-chatbot -n "$CHART_NAMESPACE"
          kubectl rollout status statefulset/x-agent-chart-chatbot -n "$CHART_NAMESPACE" --timeout=120s

      # -----------------------------------------------------------------------
      # GET-CREDENTIALS: Obtain Service credential from organization
      # -----------------------------------------------------------------------
      - name: Port-forward X Agent VS Agent
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          kubectl port-forward -n "$CHART_NAMESPACE" "svc/x-agent" 3002:3000 &
          echo "CHILD_PF_PID=$!" >> "$GITHUB_ENV"
          sleep 5
          curl -sf http://localhost:3002/v1/agent > /dev/null || {
            echo "::error::Port-forward to X Agent VS-Agent failed"
            exit 1
          }
          echo "Port-forward to X Agent VS-Agent on :3002"

      - name: Port-forward organization Agent
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          kubectl port-forward -n "$CHART_NAMESPACE" "svc/organization" 3000:3000 &
          echo "ORG_PF_PID=$!" >> "$GITHUB_ENV"
          sleep 5
          curl -sf http://localhost:3000/v1/agent > /dev/null || {
            echo "::error::Port-forward to organization-Agent failed"
            exit 1
          }
          echo "Port-forward to organization-Agent on :3000"

      - name: Get Service credential
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          ORG_ADMIN_API="http://localhost:3000"
          CHILD_ADMIN_API="http://localhost:3002"
          source common/common.sh
          set_network_vars "$NETWORK"

          CHILD_DID=$(curl -sf "${CHILD_ADMIN_API}/v1/agent" | jq -r '.publicDid')
          echo "X Agent DID: $CHILD_DID"

          CHILD_PUBLIC_URL="https://x-agent.vs.hologram.zone"
          if has_linked_vp "$CHILD_PUBLIC_URL" "service"; then
            ok "Service credential already linked — skipping"
          else
            SERVICE_VTJSC_OUTPUT=$(discover_ecs_vtjsc "$ECS_TR_PUBLIC_URL" "service")
            SERVICE_JSC_URL=$(echo "$SERVICE_VTJSC_OUTPUT" | sed -n '1p')

            download_logo_data_uri "$SERVICE_LOGO_URL" > /tmp/service_logo_data_uri

            SERVICE_CLAIMS=$(jq -n \
              --rawfile logo /tmp/service_logo_data_uri \
              --arg id "$CHILD_DID" \
              --arg name "$SERVICE_NAME" \
              --arg type "${SERVICE_TYPE:-AIAgent}" \
              --arg desc "$SERVICE_DESCRIPTION" \
              --argjson age "${SERVICE_MIN_AGE:-0}" \
              --arg terms "${SERVICE_TERMS:-}" \
              --arg privacy "${SERVICE_PRIVACY:-}" \
              '{id: $id, name: $name, type: $type, description: $desc, logo: ($logo | rtrimstr("\n")), minimumAgeRequired: $age, termsAndConditions: $terms, privacyPolicy: $privacy}')

            issue_remote_and_link "$ORG_ADMIN_API" "$CHILD_ADMIN_API" "service" "$SERVICE_JSC_URL" "$CHILD_DID" "$SERVICE_CLAIMS"
          fi

      # -----------------------------------------------------------------------
      # CLEANUP
      # -----------------------------------------------------------------------
      - name: Stop port-forwards
        if: always()
        run: |
          [ -n "${CHILD_PF_PID:-}" ] && kill "$CHILD_PF_PID" 2>/dev/null || true
          [ -n "${ORG_PF_PID:-}" ] && kill "$ORG_PF_PID" 2>/dev/null || true

      - name: Summary
        if: always()
        run: |
          echo "## X Agent VS" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **VS Agent:** https://x-agent.vs.hologram.zone/.well-known/did.json" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Network:** testnet" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Chart:** ${CHART_SOURCE}:${CHART_VERSION}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **X MCP:** ${X_MCP_IMAGE:-io2060/x-autonomous-mcp:latest}" >> "$GITHUB_STEP_SUMMARY"

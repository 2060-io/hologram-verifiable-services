name: 5_ Deploy Passport

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Which step to run"
        required: true
        type: choice
        options:
          - deploy
          - get-credentials
          - deploy-chatbot
          - all
        default: all

jobs:
  deploy-passport:
    name: Deploy Passport Issuer VS Agent and Chatbot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::This workflow can only run on the main branch (current: ${GITHUB_REF_NAME})"
            exit 1
          fi
          echo "NETWORK=testnet" >> "$GITHUB_ENV"

      - name: Load configuration
        run: |
          set -a
          source passport/config.env
          set +a
          while IFS= read -r line; do
            key="${line%%=*}"
            echo "${key}=${!key}" >> "$GITHUB_ENV"
          done < <(grep -E '^[A-Z_]+=' passport/config.env)

      - name: Parse deployment.yaml
        run: |
          CHART_SOURCE=$(yq '.chartSource' passport/deployment.yaml)
          CHART_VERSION=$(yq '.chartVersion' passport/deployment.yaml)
          CHART_NAMESPACE="${{ secrets.K8S_NAMESPACE }}"
          RELEASE_NAME=$(yq '.name' passport/deployment.yaml)
          INGRESS_HOST=$(yq '.ingress.host' passport/deployment.yaml)
          CHATBOT_HOST=$(yq '.chatbot.host' passport/deployment.yaml)
          echo "CHART_SOURCE=${CHART_SOURCE}" >> "$GITHUB_ENV"
          echo "CHART_VERSION=${CHART_VERSION}" >> "$GITHUB_ENV"
          echo "CHART_NAMESPACE=${CHART_NAMESPACE}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"
          echo "INGRESS_HOST=${INGRESS_HOST}" >> "$GITHUB_ENV"
          echo "CHATBOT_HOST=${CHATBOT_HOST}" >> "$GITHUB_ENV"

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          cat > ~/.kube/config <<'KUBEEOF'
          ${{ secrets.OVH_KUBECONFIG }}
          KUBEEOF

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.9'

      - name: Install veranad
        run: |
          VERANAD_VERSION="v0.9.4"
          curl -sfL "https://github.com/verana-labs/verana/releases/download/${VERANAD_VERSION}/veranad-linux-amd64" \
            -o /usr/local/bin/veranad
          chmod +x /usr/local/bin/veranad
          veranad version

      - name: Import account from mnemonic
        run: |
          echo "${{ secrets.VS_DEMO_MNEMONIC }}" | veranad keys add "${{ env.USER_ACC }}" --recover --keyring-backend test

      # -----------------------------------------------------------------------
      # DEPLOY: Install/upgrade VS Agent via Helm
      # -----------------------------------------------------------------------
      - name: Create VS Agent DB secret
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          VSAGENT_DB_PWD="${{ secrets.PASSPORT_VSAGENT_DB_PASSWORD }}"
          if [ -z "$VSAGENT_DB_PWD" ]; then
            VSAGENT_DB_PWD="$(openssl rand -hex 16)"
            echo "::warning::PASSPORT_VSAGENT_DB_PASSWORD secret not set — using generated password"
          fi
          kubectl create secret generic passport-db-secret \
            --namespace "$CHART_NAMESPACE" \
            --from-literal=POSTGRES_PASSWORD="$VSAGENT_DB_PWD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy VS Agent via Helm
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          APP_NAME="passport-issuer-app"
          CHATBOT_URL="http://${APP_NAME}:${CHATBOT_PORT:-2903}"
          yq 'del(.chartSource, .chartVersion)' passport/deployment.yaml > /tmp/helm-values.yaml
          yq -i '.didcommLabel = env(SERVICE_NAME)' /tmp/helm-values.yaml
          yq -i '.didcommInvitationImageUrl = env(SERVICE_LOGO_URL)' /tmp/helm-values.yaml
          export CHATBOT_URL
          yq -i '.eventsBaseUrl = env(CHATBOT_URL)' /tmp/helm-values.yaml
          helm upgrade --install "$RELEASE_NAME" "$CHART_SOURCE" \
            --version "$CHART_VERSION" \
            --namespace "$CHART_NAMESPACE" --create-namespace \
            --values /tmp/helm-values.yaml \
            --wait --timeout 300s

      # -----------------------------------------------------------------------
      # GET-CREDENTIALS: Obtain Service credential + ISSUER permission
      # -----------------------------------------------------------------------
      - name: Port-forward child VS Agent
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          kubectl port-forward -n "$CHART_NAMESPACE" "svc/$RELEASE_NAME" 3002:3000 &
          echo "CHILD_PF_PID=$!" >> "$GITHUB_ENV"
          sleep 5
          curl -sf http://localhost:3002/v1/agent > /dev/null || {
            echo "::error::Port-forward to child VS-Agent failed"
            exit 1
          }
          echo "Port-forward to child VS-Agent on :3002"

      - name: Port-forward organization Agent
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          kubectl port-forward -n "$CHART_NAMESPACE" "svc/organization" 3000:3000 &
          echo "ORG_PF_PID=$!" >> "$GITHUB_ENV"
          sleep 5
          curl -sf http://localhost:3000/v1/agent > /dev/null || {
            echo "::error::Port-forward to organization-Agent failed"
            exit 1
          }
          echo "Port-forward to organization-Agent on :3000"

      - name: Get Service credential and ISSUER permission
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          ORG_ADMIN_API="http://localhost:3000"
          CHILD_ADMIN_API="http://localhost:3002"
          source common/common.sh
          set_network_vars "$NETWORK"

          CHILD_DID=$(curl -sf "${CHILD_ADMIN_API}/v1/agent" | jq -r '.publicDid')
          echo "Child DID: $CHILD_DID"

          # Get Service credential from organization (skip if already linked)
          CHILD_PUBLIC_URL="https://${INGRESS_HOST}"
          if has_linked_vp "$CHILD_PUBLIC_URL" "service"; then
            ok "Service credential already linked — skipping"
          else
            SERVICE_VTJSC_OUTPUT=$(discover_ecs_vtjsc "$ECS_TR_PUBLIC_URL" "service")
            SERVICE_JSC_URL=$(echo "$SERVICE_VTJSC_OUTPUT" | sed -n '1p')

            download_logo_data_uri "$SERVICE_LOGO_URL" > /tmp/service_logo_data_uri

            SERVICE_CLAIMS=$(jq -n \
              --rawfile logo /tmp/service_logo_data_uri \
              --arg id "$CHILD_DID" \
              --arg name "$SERVICE_NAME" \
              --arg type "${SERVICE_TYPE:-IssuerService}" \
              --arg desc "$SERVICE_DESCRIPTION" \
              --argjson age "${SERVICE_MIN_AGE:-0}" \
              --arg terms "${SERVICE_TERMS:-}" \
              --arg privacy "${SERVICE_PRIVACY:-}" \
              '{id: $id, name: $name, type: $type, description: $desc, logo: ($logo | rtrimstr("\n")), minimumAgeRequired: $age, termsAndConditions: $terms, privacyPolicy: $privacy}')

            issue_remote_and_link "$ORG_ADMIN_API" "$CHILD_ADMIN_API" "service" "$SERVICE_JSC_URL" "$CHILD_DID" "$SERVICE_CLAIMS"
          fi

          # Discover passport schema from organization DID doc
          ORG_PUBLIC_URL="https://organization.vs.hologram.zone"

          ORG_DID_DOC=$(curl -sf "${ORG_PUBLIC_URL}/.well-known/did.json")
          CUSTOM_VP_URL=$(echo "$ORG_DID_DOC" | jq -r '
            .service[] |
            select(.type == "LinkedVerifiablePresentation") |
            select(.id | test("passport-jsc-vp")) |
            .serviceEndpoint' | head -1)

          if [ -z "$CUSTOM_VP_URL" ]; then
            echo "::error::No passport schema VP found in organization DID doc. Has the trust registry been created?"
            exit 1
          fi
          CUSTOM_VP=$(curl -sf "$CUSTOM_VP_URL")
          CUSTOM_SCHEMA_REF=$(echo "$CUSTOM_VP" | jq -r '.verifiableCredential[0].credentialSubject.jsonSchema."$ref" // empty')
          CUSTOM_SCHEMA_ID=$(echo "$CUSTOM_SCHEMA_REF" | grep -oE '[0-9]+$')
          ok "Organization passport schema ID: $CUSTOM_SCHEMA_ID"

          # Obtain ISSUER permission via VP flow
          if EXISTING_PERM=$(find_active_issuer_perm "$CUSTOM_SCHEMA_ID" "$CHILD_DID"); then
            ok "Active ISSUER permission already exists: $EXISTING_PERM — skipping"
          else
            ROOT_PERM_ID=$(discover_active_root_perm "$CUSTOM_SCHEMA_ID")
            check_balance "$USER_ACC"

            START_RESULT=$(veranad tx perm start-perm-vp \
              issuer "$ROOT_PERM_ID" \
              --did "$CHILD_DID" \
              --from "$USER_ACC" --chain-id "$CHAIN_ID" --keyring-backend test \
              --fees "$FEES" --gas auto --node "$NODE_RPC" \
              --output json -y 2>&1 | extract_tx_json)
            START_TX_HASH=$(echo "$START_RESULT" | jq -r '.txhash // empty')
            if [ -z "$START_TX_HASH" ]; then
              echo "::error::Failed to start ISSUER VP"
              exit 1
            fi
            sleep 8
            ISSUER_PERM=$(extract_tx_event "$START_TX_HASH" "start_permission_vp" "permission_id")
            if [ -z "$ISSUER_PERM" ]; then
              sleep 6
              ISSUER_PERM=$(extract_tx_event "$START_TX_HASH" "start_permission_vp" "permission_id")
            fi

            check_balance "$USER_ACC"
            veranad tx perm set-perm-vp-validated \
              "$ISSUER_PERM" \
              --from "$USER_ACC" --chain-id "$CHAIN_ID" --keyring-backend test \
              --fees "$FEES" --gas auto --node "$NODE_RPC" \
              --output json -y
            sleep 6
            ok "ISSUER permission validated: $ISSUER_PERM"
          fi

      # -----------------------------------------------------------------------
      # DEPLOY-CHATBOT: Deploy Gov ID Issuer App (pre-built image)
      # -----------------------------------------------------------------------
      - name: Deploy Passport Issuer Chatbot
        if: inputs.step == 'deploy-chatbot' || inputs.step == 'all'
        run: |
          NAMESPACE="${CHART_NAMESPACE}"
          APP_NAME="passport-issuer-app"
          IMAGE="${CHATBOT_IMAGE:-io2060/hologram-gov-id-issuer-app:v1.4.4-dev.1}"
          PORT="${CHATBOT_PORT:-2903}"

          DB_NAME="passport-issuer-db"
          DB_PASSWORD="${{ secrets.PASSPORT_CHATBOT_DB_PASSWORD }}"
          if [ -z "$DB_PASSWORD" ]; then
            DB_PASSWORD="$(openssl rand -hex 16)"
            echo "::warning::PASSPORT_CHATBOT_DB_PASSWORD secret not set — using generated password"
          fi

          # Shared infrastructure URLs (cluster-internal or external)
          VISION_SVC_URL="${VISION_URL:-https://vision.vs.hologram.zone}"
          WEBRTC_SVC_URL="${WEBRTC_SERVER_URL:-https://webrtc.vs.hologram.zone}"

          # Credential schema ID — discovered from the passport VTJSC on the
          # organization agent. The chatbot uses this to know which schema to issue.
          CREDENTIAL_SCHEMA_URL="https://${INGRESS_HOST}/vt/schemas-passport-jsc.json"

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: ${DB_NAME}-data
            namespace: ${NAMESPACE}
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 2Gi
            storageClassName: csi-cinder-high-speed
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${DB_NAME}
            namespace: ${NAMESPACE}
            labels:
              app: ${DB_NAME}
          spec:
            replicas: 1
            strategy:
              type: Recreate
            selector:
              matchLabels:
                app: ${DB_NAME}
            template:
              metadata:
                labels:
                  app: ${DB_NAME}
              spec:
                containers:
                  - name: postgres
                    image: postgres:16-alpine
                    ports:
                      - containerPort: 5432
                    env:
                      - name: POSTGRES_DB
                        value: passport
                      - name: POSTGRES_USER
                        value: passport
                      - name: POSTGRES_PASSWORD
                        value: "${DB_PASSWORD}"
                      - name: PGDATA
                        value: /var/lib/postgresql/data/pgdata
                    volumeMounts:
                      - name: pgdata
                        mountPath: /var/lib/postgresql/data
                    resources:
                      requests:
                        cpu: 50m
                        memory: 128Mi
                      limits:
                        cpu: 250m
                        memory: 256Mi
                volumes:
                  - name: pgdata
                    persistentVolumeClaim:
                      claimName: ${DB_NAME}-data
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${DB_NAME}
            namespace: ${NAMESPACE}
          spec:
            selector:
              app: ${DB_NAME}
            ports:
              - port: 5432
                targetPort: 5432
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
            labels:
              app: ${APP_NAME}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${APP_NAME}
            template:
              metadata:
                labels:
                  app: ${APP_NAME}
                annotations:
                  deploy-timestamp: "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              spec:
                containers:
                  - name: passport-issuer
                    image: ${IMAGE}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: ${PORT}
                    env:
                      - name: AGENT_PORT
                        value: "${PORT}"
                      - name: SERVICE_AGENT_ADMIN_URL
                        value: "http://${RELEASE_NAME}:3000"
                      - name: POSTGRES_HOST
                        value: "${DB_NAME}"
                      - name: POSTGRES_USER
                        value: "passport"
                      - name: POSTGRES_PASSWORD
                        value: "${DB_PASSWORD}"
                      - name: VISION_URL
                        value: "${VISION_SVC_URL}"
                      - name: WEBRTC_SERVER_URL
                        value: "${WEBRTC_SVC_URL}"
                      - name: PUBLIC_BASE_URL
                        value: "https://${CHATBOT_HOST}"
                      - name: ID_VERIFICATION_TIMEOUT_SECONDS
                        value: "${ID_VERIFICATION_TIMEOUT_SECONDS:-900}"
                      - name: CREDENTIAL_SCHEMA_ID
                        value: "${CREDENTIAL_SCHEMA_URL}"
                      - name: LOG_LEVEL
                        value: "${LOG_LEVEL:-3}"
                    livenessProbe:
                      httpGet:
                        path: /health
                        port: ${PORT}
                      initialDelaySeconds: 30
                      periodSeconds: 60
                      timeoutSeconds: 5
                      failureThreshold: 2
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: ${PORT}
                      initialDelaySeconds: 15
                      periodSeconds: 60
                      timeoutSeconds: 5
                      failureThreshold: 2
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
          spec:
            selector:
              app: ${APP_NAME}
            ports:
              - port: ${PORT}
                targetPort: ${PORT}
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/enable-cors: "true"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - ${CHATBOT_HOST}
                secretName: ${APP_NAME}-tls
            rules:
              - host: ${CHATBOT_HOST}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ${APP_NAME}
                          port:
                            number: ${PORT}
          EOF

          kubectl rollout status deployment/"${APP_NAME}" -n "$NAMESPACE" --timeout=300s

      # -----------------------------------------------------------------------
      # CLEANUP
      # -----------------------------------------------------------------------
      - name: Stop port-forwards
        if: always()
        run: |
          [ -n "${CHILD_PF_PID:-}" ] && kill "$CHILD_PF_PID" 2>/dev/null || true
          [ -n "${ORG_PF_PID:-}" ] && kill "$ORG_PF_PID" 2>/dev/null || true

      - name: Summary
        if: always()
        run: |
          echo "## Passport Issuer" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${INGRESS_HOST:-}" ]; then
            echo "- **VS Agent:** https://${INGRESS_HOST}/.well-known/did.json" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${CHATBOT_HOST:-}" ]; then
            echo "- **Chatbot App:** https://${CHATBOT_HOST}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- **Network:** testnet" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Chatbot Image:** ${CHATBOT_IMAGE:-io2060/hologram-gov-id-issuer-app:v1.4.4-dev.1}" >> "$GITHUB_STEP_SUMMARY"

name: 6_ Deploy Playground

on:
  workflow_dispatch:

jobs:
  deploy-playground:
    name: Build and Deploy Playground
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::This workflow can only run on the main branch (current: ${GITHUB_REF_NAME})"
            exit 1
          fi
          echo "NETWORK=testnet" >> "$GITHUB_ENV"

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          cat > ~/.kube/config <<'KUBEEOF'
          ${{ secrets.OVH_KUBECONFIG }}
          KUBEEOF

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.9'

      # -----------------------------------------------------------------------
      # BUILD: Docker image
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Build and push Playground image
        uses: docker/build-push-action@v6
        with:
          context: ./playground
          push: true
          tags: |
            io2060/avatar-playground:${{ github.sha }}
            io2060/avatar-playground:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # DEPLOY: Kubernetes resources
      # -----------------------------------------------------------------------
      - name: Deploy Playground
        run: |
          NAMESPACE="${{ secrets.K8S_NAMESPACE }}"
          APP_NAME="playground"
          IMAGE="io2060/avatar-playground:${{ github.sha }}"
          HOST="vs.hologram.zone"
          PORT=3000

          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
            labels:
              app: ${APP_NAME}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${APP_NAME}
            template:
              metadata:
                labels:
                  app: ${APP_NAME}
                annotations:
                  deploy-timestamp: "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              spec:
                containers:
                  - name: playground
                    image: ${IMAGE}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: ${PORT}
                    env:
                      - name: ISSUER_CHATBOT_VS_ADMIN_URL
                        value: "http://avatar:3000"
                      - name: VERIFIER_CHATBOT_VS_ADMIN_URL
                        value: "http://verifier-chatbot-vs:3000"
                      - name: VERIFIER_WEB_URL
                        value: "http://verifier-web-app:4003"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
          spec:
            selector:
              app: ${APP_NAME}
            ports:
              - port: ${PORT}
                targetPort: ${PORT}
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/enable-cors: "true"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - ${HOST}
                secretName: ${APP_NAME}-tls
            rules:
              - host: ${HOST}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ${APP_NAME}
                          port:
                            number: ${PORT}
          EOF

          kubectl rollout status deployment/"${APP_NAME}" -n "$NAMESPACE" --timeout=300s

      # -----------------------------------------------------------------------
      # SUMMARY
      # -----------------------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          echo "## Playground" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Network:** testnet" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://vs.hologram.zone" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** io2060/avatar-playground:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

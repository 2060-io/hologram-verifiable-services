name: 5_ Deploy Verifier Web VS

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Which step to run"
        required: true
        type: choice
        options:
          - deploy
          - get-credentials
          - deploy-web
          - all
        default: all

jobs:
  deploy-verifier-web-vs:
    name: Deploy Verifier Web VS Agent and Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate branch
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "::error::This workflow can only run on the main branch (current: ${GITHUB_REF_NAME})"
            exit 1
          fi
          echo "NETWORK=testnet" >> "$GITHUB_ENV"

      - name: Load configuration
        run: |
          set -a
          source verifier-web-vs/config.env
          set +a
          while IFS= read -r line; do
            key="${line%%=*}"
            echo "${key}=${!key}" >> "$GITHUB_ENV"
          done < <(grep -E '^[A-Z_]+=' verifier-web-vs/config.env)

      - name: Parse deployment.yaml
        run: |
          CHART_SOURCE=$(yq '.chartSource' verifier-web-vs/deployment.yaml)
          CHART_VERSION=$(yq '.chartVersion' verifier-web-vs/deployment.yaml)
          CHART_NAMESPACE="${{ secrets.K8S_NAMESPACE }}"
          RELEASE_NAME=$(yq '.name' verifier-web-vs/deployment.yaml)
          INGRESS_HOST=$(yq '.ingress.host' verifier-web-vs/deployment.yaml)
          echo "CHART_SOURCE=${CHART_SOURCE}" >> "$GITHUB_ENV"
          echo "CHART_VERSION=${CHART_VERSION}" >> "$GITHUB_ENV"
          echo "CHART_NAMESPACE=${CHART_NAMESPACE}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"
          echo "INGRESS_HOST=${INGRESS_HOST}" >> "$GITHUB_ENV"

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          cat > ~/.kube/config <<'KUBEEOF'
          ${{ secrets.OVH_KUBECONFIG }}
          KUBEEOF

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.9'

      - name: Install veranad
        run: |
          VERANAD_VERSION="v0.9.4"
          curl -sfL "https://github.com/verana-labs/verana/releases/download/${VERANAD_VERSION}/veranad-linux-amd64" \
            -o /usr/local/bin/veranad
          chmod +x /usr/local/bin/veranad
          veranad version

      - name: Import account from mnemonic
        run: |
          echo "${{ secrets.VS_DEMO_MNEMONIC }}" | veranad keys add "${{ env.USER_ACC }}" --recover --keyring-backend test

      # -----------------------------------------------------------------------
      # DEPLOY: Install/upgrade VS Agent via Helm
      # -----------------------------------------------------------------------
      - name: Deploy VS Agent via Helm
        if: inputs.step == 'deploy' || inputs.step == 'all'
        run: |
          yq 'del(.chartSource, .chartVersion)' verifier-web-vs/deployment.yaml > /tmp/helm-values.yaml
          yq -i '.didcommLabel = env(SERVICE_NAME)' /tmp/helm-values.yaml
          yq -i '.didcommInvitationImageUrl = env(SERVICE_LOGO_URL)' /tmp/helm-values.yaml
          helm upgrade --install "$RELEASE_NAME" "$CHART_SOURCE" \
            --version "$CHART_VERSION" \
            --namespace "$CHART_NAMESPACE" --create-namespace \
            --values /tmp/helm-values.yaml \
            --wait --timeout 300s

      # -----------------------------------------------------------------------
      # GET-CREDENTIALS: Obtain Service credential + VERIFIER permission
      # -----------------------------------------------------------------------
      - name: Port-forward child VS Agent
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          kubectl port-forward -n "$CHART_NAMESPACE" "svc/$RELEASE_NAME" 3002:3000 &
          echo "CHILD_PF_PID=$!" >> "$GITHUB_ENV"
          sleep 5
          curl -sf http://localhost:3002/v1/agent > /dev/null || {
            echo "::error::Port-forward to child VS-Agent failed"
            exit 1
          }

      - name: Port-forward organization VS Agent
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          kubectl port-forward -n "$CHART_NAMESPACE" "svc/organization-vs" 3000:3000 &
          echo "ORG_PF_PID=$!" >> "$GITHUB_ENV"
          sleep 5
          curl -sf http://localhost:3000/v1/agent > /dev/null || {
            echo "::error::Port-forward to organization VS-Agent failed"
            exit 1
          }

      - name: Get Service credential and VERIFIER permission
        if: inputs.step == 'get-credentials' || inputs.step == 'all'
        run: |
          ORG_ADMIN_API="http://localhost:3000"
          CHILD_ADMIN_API="http://localhost:3002"
          source common/common.sh
          set_network_vars "$NETWORK"

          CHILD_DID=$(curl -sf "${CHILD_ADMIN_API}/v1/agent" | jq -r '.publicDid')
          echo "Child DID: $CHILD_DID"

          # Get Service credential from organization-vs (skip if already linked)
          CHILD_PUBLIC_URL="https://${INGRESS_HOST}"
          if has_linked_vp "$CHILD_PUBLIC_URL" "service"; then
            ok "Service credential already linked — skipping"
          else
            SERVICE_VTJSC_OUTPUT=$(discover_ecs_vtjsc "$ECS_TR_PUBLIC_URL" "service")
            SERVICE_JSC_URL=$(echo "$SERVICE_VTJSC_OUTPUT" | sed -n '1p')

            download_logo_data_uri "$SERVICE_LOGO_URL" > /tmp/service_logo_data_uri

            SERVICE_CLAIMS=$(jq -n \
              --rawfile logo /tmp/service_logo_data_uri \
              --arg id "$CHILD_DID" \
              --arg name "$SERVICE_NAME" \
              --arg type "${SERVICE_TYPE:-VerifierService}" \
              --arg desc "$SERVICE_DESCRIPTION" \
              --argjson age "${SERVICE_MIN_AGE:-0}" \
              --arg terms "${SERVICE_TERMS:-}" \
              --arg privacy "${SERVICE_PRIVACY:-}" \
              '{id: $id, name: $name, type: $type, description: $desc, logo: ($logo | rtrimstr("\n")), minimumAgeRequired: $age, termsAndConditions: $terms, privacyPolicy: $privacy}')

            issue_remote_and_link "$ORG_ADMIN_API" "$CHILD_ADMIN_API" "service" "$SERVICE_JSC_URL" "$CHILD_DID" "$SERVICE_CLAIMS"
          fi

          # Discover custom schema from organization-vs DID doc
          ORG_PUBLIC_URL="https://organization-vs.avatar.hologram.zone"
          ORG_DID_DOC=$(curl -sf "${ORG_PUBLIC_URL}/.well-known/did.json")

          CUSTOM_VP_URL=$(echo "$ORG_DID_DOC" | jq -r '
            .service[] |
            select(.type == "LinkedVerifiablePresentation") |
            select(.id | test("organization-jsc-vp|service-jsc-vp") | not) |
            select(.id | test("jsc-vp")) |
            .serviceEndpoint' | head -1)

          if [ -z "$CUSTOM_VP_URL" ]; then
            echo "::error::No custom schema VP found in organization-vs DID doc. Has the trust registry been created?"
            exit 1
          fi
          CUSTOM_VP=$(curl -sf "$CUSTOM_VP_URL")
          CUSTOM_SCHEMA_REF=$(echo "$CUSTOM_VP" | jq -r '.verifiableCredential[0].credentialSubject.jsonSchema."$ref" // empty')
          CUSTOM_SCHEMA_ID=$(echo "$CUSTOM_SCHEMA_REF" | grep -oE '[0-9]+$')
          ok "Organization-vs custom schema ID: $CUSTOM_SCHEMA_ID"

          # Self-create VERIFIER permission (verifier_mode=OPEN)
          if find_active_verifier_perm "$CUSTOM_SCHEMA_ID" "$CHILD_DID" > /dev/null 2>&1; then
            ok "Active VERIFIER permission already exists — skipping"
          else
            check_balance "$USER_ACC"
            EFFECTIVE_FROM=$(future_timestamp 15)
            VERIFIER_PERM=$(submit_tx "create_permission" "permission_id" \
              veranad tx perm create-perm "$CUSTOM_SCHEMA_ID" verifier "$CHILD_DID" \
              --effective-from "$EFFECTIVE_FROM")
            sleep 21
            ok "VERIFIER permission created: $VERIFIER_PERM"
          fi

      # -----------------------------------------------------------------------
      # DEPLOY-WEB: Build and deploy Web Verifier service
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        if: inputs.step == 'deploy-web' || inputs.step == 'all'
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        if: inputs.step == 'deploy-web' || inputs.step == 'all'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Build and push Web Verifier image
        if: inputs.step == 'deploy-web' || inputs.step == 'all'
        uses: docker/build-push-action@v6
        with:
          context: ./verifier-web-vs/verifier-web
          push: true
          tags: |
            io2060/avatar-verifier-web:${{ github.sha }}
            io2060/avatar-verifier-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Web Verifier
        if: inputs.step == 'deploy-web' || inputs.step == 'all'
        run: |
          NAMESPACE="${CHART_NAMESPACE}"
          APP_NAME="verifier-web-app"
          IMAGE="io2060/avatar-verifier-web:${{ github.sha }}"
          PORT="${VERIFIER_WEB_PORT:-4003}"

          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
            labels:
              app: ${APP_NAME}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: ${APP_NAME}
            template:
              metadata:
                labels:
                  app: ${APP_NAME}
                annotations:
                  deploy-timestamp: "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              spec:
                containers:
                  - name: verifier-web
                    image: ${IMAGE}
                    imagePullPolicy: Always
                    ports:
                      - containerPort: ${PORT}
                    env:
                      - name: VS_AGENT_ADMIN_URL
                        value: "http://${RELEASE_NAME}:3000"
                      - name: ORG_VS_ADMIN_URL
                        value: "http://organization-vs:3000"
                      - name: ORG_VS_PUBLIC_URL
                        value: "https://organization-vs.avatar.hologram.zone"
                      - name: ISSUER_VS_PUBLIC_URL
                        value: "https://issuer-web-vs.avatar.hologram.zone"
                      - name: VERIFIER_PORT
                        value: "${PORT}"
                      - name: SERVICE_NAME
                        value: "${SERVICE_NAME}"
                      - name: CUSTOM_SCHEMA_BASE_ID
                        value: "${CUSTOM_SCHEMA_BASE_ID:-example}"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
          spec:
            selector:
              app: ${APP_NAME}
            ports:
              - port: ${PORT}
                targetPort: ${PORT}
          ---
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${APP_NAME}
            namespace: ${NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/enable-cors: "true"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - app.verifier-web-vs.avatar.hologram.zone
                secretName: ${APP_NAME}-tls
            rules:
              - host: app.verifier-web-vs.avatar.hologram.zone
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ${APP_NAME}
                          port:
                            number: ${PORT}
          EOF

          kubectl rollout status deployment/"${APP_NAME}" -n "$NAMESPACE" --timeout=300s

      - name: Configure VS-Agent EVENTS_BASE_URL
        if: inputs.step == 'deploy-web' || inputs.step == 'all'
        run: |
          APP_NAME="verifier-web-app"
          WEB_URL="http://${APP_NAME}:${VERIFIER_WEB_PORT:-4003}/webhooks"
          kubectl set env statefulset/"${RELEASE_NAME}" \
            -n "$CHART_NAMESPACE" \
            EVENTS_BASE_URL="$WEB_URL"

      # -----------------------------------------------------------------------
      # CLEANUP
      # -----------------------------------------------------------------------
      - name: Stop port-forwards
        if: always()
        run: |
          [ -n "${CHILD_PF_PID:-}" ] && kill "$CHILD_PF_PID" 2>/dev/null || true
          [ -n "${ORG_PF_PID:-}" ] && kill "$ORG_PF_PID" 2>/dev/null || true

      - name: Summary
        if: always()
        run: |
          echo "## Verifier Web VS" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${INGRESS_HOST:-}" ]; then
            echo "- **VS Agent:** https://${INGRESS_HOST}/.well-known/did.json" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- **Network:** testnet" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.step }}" = "deploy-web" ] || [ "${{ inputs.step }}" = "all" ]; then
            echo "- **Web App:** https://app.verifier-web-vs.avatar.hologram.zone" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Web Image:** io2060/avatar-verifier-web:${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          fi

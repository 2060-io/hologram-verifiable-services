name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  avatar-issuer-chatbot:
    name: Avatar issuer-chatbot build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: avatar/issuer-chatbot
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: avatar/issuer-chatbot/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

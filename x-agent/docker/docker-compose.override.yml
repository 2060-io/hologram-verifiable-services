# Local overrides for testing hologram-ai-agent PR #102 (pgvector RAG) on this arm64 machine.
# Do NOT commit.
#
# Flow: the VS Agent runs STANDALONE via scripts/setup.sh (ports 3030/3031, wallet
# in ./data, ngrok DID) — so compose must not start its own vs-agent. Bring up the
# rest in two steps from x-agent/:
#
#   docker compose --env-file ids.env \
#     -f docker/docker-compose.yml -f docker/docker-compose.override.yml up -d postgres redis minio
#   docker compose --env-file ids.env \
#     -f docker/docker-compose.yml -f docker/docker-compose.override.yml up --no-deps chatbot
#
# (--no-deps keeps compose from starting the vs-agent service that chatbot depends_on.)
services:
  # Safety net if someone runs a plain `up`: never start vs-agent here —
  # it is provided standalone by scripts/setup.sh.
  vs-agent:
    deploy:
      replicas: 0

  # Locally built arm64 image (docker tag of the local :latest build); the base
  # file pins linux/amd64, which forces the non-runnable remote variant.
  x-mcp:
    image: io2060/x-autonomous-mcp:arm64-local
    platform: linux/arm64

  postgres:
    image: pgvector/pgvector:pg16

  chatbot:
    # built locally: hologram-ai-agent repo, branch feat/rag-idempotent-seeding-pgvector
    #   docker build -t io2060/hologram-ai-agent:pgvector-test .
    image: io2060/hologram-ai-agent:pgvector-test
    platform: linux/arm64
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      - VECTOR_STORE=pgvector # overrides the base file's =redis
      - VS_AGENT_ADMIN_URL=http://host.docker.internal:3030 # standalone vs-agent from setup.sh
      - MINIO_PUBLIC_URL=http://192.168.0.24:9000 # LAN-reachable (base file says localhost — unreachable from container and phone)

memory:
  backend: redis
  window: 20
  redisUrl: redis://redis:6379

flows:
  welcome:
    enabled: true
    sendOnProfile: true
    templateKey: greetingMessage
  authentication:
    enabled: true
    required: true
    credentialDefinitionId: ${CREDENTIAL_DEFINITION_ID}
    userIdentityAttribute: name
    adminUsers:
      - mj
      - fafa
  menu:
    items:
      - id: authenticate
        labelKey: CREDENTIAL
        action: authenticate
        visibleWhen: unauthenticated
      - id: logout
        labelKey: LOGOUT
        action: logout
        visibleWhen: authenticated

speechToText:
  requireAuth: true
  provider:
    name: whisper
    type: openai-whisper
    model: whisper-1

imageGeneration:
  providers:
    - name: dalle
      type: openai-dalle
      model: dall-e-3
      # Uses OPENAI_API_KEY by default; set apiKeyEnv to override
      defaultSize: 1024x1024

mcp:
  servers:
    - name: x-twitter
      transport: streamable-http
      url: ${X_MCP_URL}
      toolAccess:
        default: admin

integrations:
  vsAgent:
    adminUrl: http://vs-agent:3000
  postgres:
    host: postgres
    user: x_agent_db
    password: changeme
    dbName: x-agent

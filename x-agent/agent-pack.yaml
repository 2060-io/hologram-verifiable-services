# X Agent — Agent Pack (local development)
#
# This file is mounted into the chatbot container by docker-compose.
# For K8s deployment, the agent pack is embedded in deployment.yaml.
metadata:
  id: x-agent
  displayName: X Agent
  description: >-
    A multi-language AI agent with X (Twitter) MCP integration for composing,
    publishing, and managing posts on X via the Hologram + Verana ecosystem.
  defaultLanguage: en
  tags:
    - x
    - twitter
    - mcp
    - social-media
    - hologram

languages:
